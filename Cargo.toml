[package]
name = "uflow"
version = "0.1.0"
edition = "2024"
description = "workflow"
license = "Apache-2.0"
repository = "https://github.com/uporm/uflow"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"
