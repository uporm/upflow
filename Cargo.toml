[package]
name = "uflow"
version = "0.1.0"
edition = "2024"
description = "workflow"
license = "Apache-2.0"
repository = "https://github.com/uporm/uflow"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.5"
thiserror = "1.0"
once_cell = "1.19"
fxhash = "0.2"
uuid = { version = "1.7", features = ["v4"] }
async-trait = "0.1" # 虽然 2024 支持 native async trait，但复杂生命周期下 async-trait 仍更稳健
tracing = "0.1"